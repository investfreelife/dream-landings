name: Validate parser storage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Каждая папка лида должна иметь data.json
      - name: Each <slug>/ has data.json
        run: |
          set -e
          fail=0
          for d in */; do
            case "$d" in .github/*|node_modules/*) continue ;; esac
            if [ ! -f "$d/data.json" ]; then
              echo "::error::Missing $d/data.json"
              fail=1
            fi
          done
          exit $fail

      # Все фото — webp, до 250 KB
      - name: Photos are webp ≤250KB
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            case "$f" in *.webp) ;; *) echo "::error::$f not webp"; fail=1; continue ;; esac
            sz=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
            if [ "$sz" -gt 256000 ]; then
              echo "::error::$f is $sz bytes (>250KB)"
              fail=1
            fi
          done < <(find . -path '*/photos/*' -type f -not -path './.*')
          exit $fail

      # JSON-файлы валидны
      - name: JSON files are valid
        run: |
          set -e
          fail=0
          for f in $(find . -name '*.json' -not -path './.*'); do
            if ! python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              echo "::error::$f invalid JSON"
              fail=1
            fi
          done
          exit $fail
